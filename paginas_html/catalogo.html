<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo — Petcingo</title>
  <meta name="description" content="Catálogo de planes Petcingo — Placas NFC + QR para mascotas.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://prueb2.dashnexpages.net/assets/fonts/remixicon/remixicon.css" rel="stylesheet">
  <style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
    background: #F8F9FB; color: #212121; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    -webkit-font-smoothing: antialiased;
  }
  .cat-nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px; height: 60px;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(20px) saturate(200%); -webkit-backdrop-filter: blur(20px) saturate(200%);
    border-bottom: 1px solid rgba(0,0,0,0.06);
  }
  .cat-nav-logo { display: flex; align-items: center; gap: 7px; text-decoration: none; }
  .cat-nav-logo img { height: 28px; width: auto; }
  .cat-nav-logo-text { font-family: 'Sora', sans-serif; font-size: 1rem; font-weight: 800; color: #4552CC; }
  .cat-nav-link { font-size: 0.85rem; font-weight: 600; color: #4552CC; text-decoration: none; }
  .cat-nav-link:hover { text-decoration: underline; }

  .cat-center {
    text-align: center; padding: 40px 24px; max-width: 480px;
    position: relative; z-index: 1;
  }
  .cat-logo-wrap { margin-bottom: 28px; }
  .cat-logo-wrap img { height: 48px; width: auto; margin: 0 auto; display: block; }
  .cat-logo-fallback { font-family: 'Sora', sans-serif; font-size: 1.6rem; font-weight: 800; color: #4552CC; display: none; }
  .cat-spinner {
    width: 40px; height: 40px; border: 3px solid rgba(69,82,204,0.15);
    border-top-color: #4552CC; border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .cat-title {
    font-family: 'Sora', sans-serif; font-size: 1.3rem; font-weight: 800;
    color: #212121; margin-bottom: 8px;
  }
  .cat-sub { font-size: 0.9rem; color: #757575; line-height: 1.6; margin-bottom: 24px; }
  .cat-btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 7px;
    padding: 13px 28px; border-radius: 13px;
    background: #4552CC; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.9rem; font-weight: 700; text-decoration: none;
    transition: background 0.18s; box-shadow: 0 4px 16px rgba(69,82,204,0.25);
  }
  .cat-btn:hover { background: #2E3A9E; }

  .cat-footer {
    position: fixed; bottom: 0; left: 0; right: 0;
    text-align: center; padding: 16px 20px;
    font-size: 0.75rem; color: #9E9E9E;
    border-top: 1px solid rgba(0,0,0,0.05); background: #fff;
  }
  .cat-footer a { color: #4552CC; text-decoration: none; }
  </style>
</head>
<body>

<nav class="cat-nav">
  <a class="cat-nav-logo" href="https://prueb2.dashnexpages.net/home/">
    <img src="https://prueb2.dashnexpages.net/assets/images/logo/petcingo-logo-dark.png" alt="Petcingo"
         onerror="this.style.display='none';this.nextElementSibling.style.display='inline'">
    <span class="cat-nav-logo-text" style="display:none">PETCINGO</span>
  </a>
  <a class="cat-nav-link" href="https://prueb2.dashnexpages.net/finalizar-compra/">Ver planes</a>
</nav>

<div class="cat-center">
  <div class="cat-logo-wrap">
    <img src="https://prueb2.dashnexpages.net/assets/images/logo/petcingo-logo-dark.png"
         alt="Petcingo"
         onerror="this.style.display='none';document.querySelector('.cat-logo-fallback').style.display='block'">
    <span class="cat-logo-fallback">PETCINGO</span>
  </div>
  <div class="cat-spinner"></div>
  <div class="cat-title">Redirigiendo al catálogo...</div>
  <p class="cat-sub">Petcingo tiene un solo catálogo: placas inteligentes NFC + QR para identificar a tu mascota.</p>
  <a class="cat-btn" href="https://prueb2.dashnexpages.net/finalizar-compra/">
    <i class="ri-arrow-right-circle-line"></i> Ver planes
  </a>
</div>

<footer class="cat-footer">
  &copy; 2026 <a href="https://prueb2.dashnexpages.net/home/">Petcingo</a> — Sistema de Identificación de Mascotas
</footer>

<script>
setTimeout(function () {
  var params = window.location.search;
  window.location.replace('https://prueb2.dashnexpages.net/finalizar-compra/' + (params || ''));
}, 1800);
</script>
</body>
</html>
